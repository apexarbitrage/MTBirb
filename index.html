  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;

      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center;\"><div style=\"width:5px; height:5px; border-radius:50%; background:#fff; box-shadow:0 7px 0 #fff, 0 -7px 0 #fff;\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- listening waveform -->\n            <div style=\"position:absolute; top:380px; left:0; right:0; display:flex; align-items:center; justify-content:center; gap:3px; height:40px; pointer-events:none;\">\n              <div style=\"width:3px; height:40%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:70%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:95%; background:#c2703d; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:60%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:85%; background:#c2703d; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:45%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:75%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:100%; background:#c2703d; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:55%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:80%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv><div style=\"width:3px; height:38%; background:#8a9a5b; border-radius:2px;\"><\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- result sheet -->\n            <div style=\"position:absolute; left:0; right:0; bottom:0; background:#f4f1ea; border-radius:24px 24px 0 0; padding:14px 20px 30px; color:#21302a;\">\n              <div style=\"width:40px; height:5px; border-radius:99px; background:#cfccc0; margin:0 auto 14px;\"><\u002Fdiv>\n              <div style=\"display:flex; align-items:center; gap:14px;\">\n                <image-slot id=\"sp-birdid-result\" style=\"width:60px; height:60px; flex:none;\" shape=\"rounded\" radius=\"14\" placeholder=\"Photo\"><\u002Fimage-slot>\n                <div style=\"flex:1;\">\n                  <div style=\"display:flex; align-items:center; gap:8px;\"><div style=\"font-size:19px; font-weight:800;\">Pileated Woodpecker<\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:12px; color:#7a7d70; font-family:'Space Mono',monospace;\">Dryocopus pileatus<\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:6px; margin-top:6px;\"><div style=\"font-size:12px; font-weight:800; color:#fff; background:#5a8a4a; border-radius:999px; padding:3px 9px;\">97% match<\u002Fdiv><span style=\"font-size:11px; color:#8a9a5b; font-weight:700;\">Heard 2× nearby<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:10px; margin-top:14px;\">\n                <div style=\"flex:1; height:48px; border-radius:14px; background:#c2703d; color:#fff; font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center;\">Add to trip list<\u002Fdiv>\n                <div style=\"width:48px; height:48px; border-radius:14px; background:#eceadf; display:flex; align-items:center; justify-content:center;\"><div style=\"width:14px; height:14px; border:2px solid #2d3b2d; border-radius:0 3px 3px 3px;\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fx-import>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"height:20px;\"><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { selectedId: 'raptor', sortBy: 'wildlife' };\n\n  trails() {\n    return [\n      { id:'raptor', name:'Raptor Ridge', score:94, diff:'Advanced', miles:8.4, effort:8.7,\n        window:'6:10–8:30 AM · best light & activity', realfeel:'54°', sky:'Clear', condition:'Tacky',\n        peak:'Northern Goshawk, Pileated Woodpecker', metaTime:'AM', metaBird:'Goshawk' },\n      { id:'owl', name:'Owl Hollow', score:91, diff:'Intermediate', miles:5.5, effort:6.1,\n        window:'Dusk · 7:40–8:50 PM · peak owl calls', realfeel:'58°', sky:'Clear', condition:'Tacky',\n        peak:'Northern Pygmy-Owl', metaTime:'dusk', metaBird:'Pygmy-Owl' },\n      { id:'cedar', name:'Cedar Dust', score:88, diff:'Intermediate', miles:6.2, effort:6.8,\n        window:'Morning · 6:30–9:00 AM · cool & calm', realfeel:'52°', sky:'Part cloud', condition:'Tacky',\n        peak:'Pileated Woodpecker', metaTime:'AM', metaBird:'Pileated Woodpecker' },\n      { id:'marsh', name:'Marsh Loop', score:76, diff:'Easy', miles:3.1, effort:3.4,\n        window:'Midday · 11 AM–1 PM · wetland activity', realfeel:'63°', sky:'Clear', condition:'Dry',\n        peak:'Great Blue Heron', metaTime:'midday', metaBird:'Heron' },\n    ];\n  }\n\n  scoreColor(score) { return score >= 85 ? '#c2703d' : '#7d8a4f'; }\n\n  diffMarker(diff, size, onDark) {\n    const s = size + 'px';\n    if (diff === 'Advanced') return { width:s, height:s, background:'#11160f', transform:'rotate(45deg)', border: onDark ? '1.5px solid #f4f1ea' : 'none', flex:'none' };\n    if (diff === 'Intermediate') return { width:s, height:s, background:'#2f6cc4', borderRadius:'3px', flex:'none' };\n    return { width:s, height:s, background:'#3f8a4d', borderRadius:'50%', flex:'none' };\n  }\n\n  diffRank(d) { return d === 'Easy' ? 1 : d === 'Intermediate' ? 2 : 3; }\n  fmtTime(min) { const h = Math.floor(min / 60), m = min % 60; return h ? (h + ':' + String(m).padStart(2, '0')) : (m + ' min'); }\n  trailExtras() {\n    return {\n      raptor: { features: ['Rock garden', 'Drops', 'Tech climb'], rideTime: 65, likelyBirds: ['Northern Goshawk', 'Pileated Woodpecker', 'Sooty Grouse'] },\n      owl:    { features: ['Jumps', 'Berms', 'Flow'], rideTime: 48, likelyBirds: ['Northern Pygmy-Owl', 'Varied Thrush', 'Pacific Wren'] },\n      cedar:  { features: ['Flow', 'Roots'], rideTime: 52, likelyBirds: ['Pileated Woodpecker', 'Red Crossbill', 'Gray Jay'] },\n      marsh:  { features: ['Boardwalk', 'Flowy'], rideTime: 26, likelyBirds: ['Great Blue Heron', 'Green Heron', 'Belted Kingfisher'] },\n    };\n  }\n  trips() {\n    return [\n      { date: 'Jun 14, 2026', trail: 'Owl Hollow', diff: 'Intermediate', miles: 5.5, birds: ['Northern Pygmy-Owl', 'Varied Thrush', 'Pacific Wren'], lifers: 1 },\n      { date: 'Jun 7, 2026', trail: 'Cedar Dust', diff: 'Intermediate', miles: 6.2, birds: ['Pileated Woodpecker', 'Red Crossbill'], lifers: 0 },\n      { date: 'May 30, 2026', trail: 'Raptor Ridge', diff: 'Advanced', miles: 8.4, birds: ['Northern Goshawk', 'Band-tailed Pigeon', 'Sooty Grouse', 'Hermit Warbler'], lifers: 2 },\n      { date: 'May 18, 2026', trail: 'Marsh Loop', diff: 'Easy', miles: 3.1, birds: ['Great Blue Heron', 'Green Heron'], lifers: 0 },\n    ];\n  }\n\n  speciesCatalog() {\n    return [\n      { name: 'Barred Owl', sci: 'Strix varia', slotId: 'sp-barred-owl', like: 'High', likeColor: '#c2703d', trails: ['owl', 'cedar'] },\n      { name: 'Pileated Woodpecker', sci: 'Dryocopus pileatus', slotId: 'sp-pileated', like: 'High', likeColor: '#c2703d', trails: ['raptor', 'cedar'] },\n      { name: 'Red Fox', sci: 'Vulpes vulpes', slotId: 'sp-redfox', like: 'Med', likeColor: '#8a9a5b', trails: ['raptor', 'marsh'] },\n      { name: 'Northern Goshawk', sci: 'Accipiter gentilis', slotId: 'sp-goshawk', like: 'Rare', likeColor: '#b6915a', trails: ['raptor'] },\n    ];\n  }\n\n  scrollToScreen(label) {\n    const el = document.querySelector('[data-screen-label=\"' + label + '\"]');\n    if (!el) return;\n    const doc = el.ownerDocument;\n    const se = doc.scrollingElement || doc.documentElement;\n    const r = el.getBoundingClientRect();\n    const top = r.top + se.scrollTop - 40;\n    const left = r.left + se.scrollLeft - 40;\n    se.scrollTop = top;\n    se.scrollLeft = left;\n  }\n\n  renderVals() {\n    const all = this.trails();\n    const sel = all.find(t => t.id === this.state.selectedId) || all[0];\n    const score = sel.score;\n    const heroRing = { width:'34px', height:'34px', borderRadius:'50%', flex:'none',\n      background: 'conic-gradient(#c2703d 0% ' + score + '%, rgba(255,255,255,0.2) ' + score + '% 100%)',\n      display:'flex', alignItems:'center', justifyContent:'center' };\n\n    const by = this.state.sortBy;\n    const rest = all.filter(t => t.id !== sel.id);\n    rest.sort((a, b) => by === 'distance' ? a.miles - b.miles : by === 'effort' ? a.effort - b.effort : b.score - a.score);\n    const self = this;\n    const ranked = rest.map((t, i) => ({\n      name: t.name, score: String(t.score), rankLabel: String(i + 2),\n      meta: t.miles + ' mi · ' + t.metaTime + ' · ' + t.metaBird,\n      dot: self.diffMarker(t.diff, 10, false),\n      rankBox: { fontSize:'15px', fontWeight:'800', color: self.scoreColor(t.score), width:'18px', fontFamily:\"'Space Mono',monospace\" },\n      scoreBox: { fontSize:'15px', fontWeight:'800', color: self.scoreColor(t.score),\n        background: t.score >= 85 ? 'rgba(194,112,61,0.14)' : 'rgba(138,154,91,0.18)', borderRadius:'8px', padding:'4px 9px' },\n      select: () => self.setState({ selectedId: t.id }),\n    }));\n\n    const by2 = this.state.sortBy;\n    const sortLabel = by2 === 'distance' ? 'DISTANCE' : by2 === 'effort' ? 'EFFORT' : 'WILDLIFE';\n\n    // ---- Trails list screen ----\n    const ex = this.trailExtras();\n    const ts = this.state.trailSort || 'sighting';\n    const defaultDir = { sighting: 'desc', difficulty: 'asc', time: 'asc', effort: 'asc', features: 'desc' };\n    const dir = this.state.trailDir || defaultDir[ts];\n    const tlist = all.map(t => Object.assign({}, t, ex[t.id]));\n    const cmp = {\n      difficulty: (a, b) => this.diffRank(a.diff) - this.diffRank(b.diff),\n      time: (a, b) => a.rideTime - b.rideTime,\n      effort: (a, b) => a.effort - b.effort,\n      features: (a, b) => a.features.length - b.features.length,\n      sighting: (a, b) => a.score - b.score,\n    }[ts];\n    tlist.sort((a, b) => dir === 'asc' ? cmp(a, b) : -cmp(a, b));\n    // species filter from Targeting\n    const catalog = this.speciesCatalog();\n    const filterName = this.state.trailFilter || null;\n    const filterEntry = filterName ? catalog.find(s => s.name === filterName) : null;\n    const tdisplay = filterEntry ? tlist.filter(t => filterEntry.trails.includes(t.id)) : tlist;\n    const chipBase = { flex: 'none', height: '32px', padding: '0 14px', borderRadius: '999px', fontSize: '13px', fontWeight: '600', display: 'flex', alignItems: 'center', cursor: 'pointer', whiteSpace: 'nowrap' };\n    const trailSortChips = [['sighting', 'Sighting'], ['difficulty', 'Difficulty'], ['time', 'Time to ride'], ['effort', 'Effort'], ['features', 'Features']].map(([k, l]) => ({\n      label: ts === k ? (l + (dir === 'asc' ? '  ↑' : '  ↓')) : l,\n      style: ts === k\n        ? Object.assign({}, chipBase, { background: '#c2703d', color: '#fff' })\n        : Object.assign({}, chipBase, { background: '#fff', color: '#4a5248', boxShadow: '0 1px 2px rgba(0,0,0,0.05)' }),\n      pick: () => this.setState(s => {\n        if ((s.trailSort || 'sighting') === k) return { trailDir: (s.trailDir || defaultDir[k]) === 'asc' ? 'desc' : 'asc' };\n        return { trailSort: k, trailDir: defaultDir[k] };\n      }),\n    }));\n    const trailList = tdisplay.map(t => ({\n      name: t.name, diff: t.diff, score: String(t.score),\n      meta: t.miles + ' mi · ' + this.fmtTime(t.rideTime) + ' · E' + t.effort + ' · ' + t.diff,\n      features: t.features.join('  ·  '),\n      birds: t.likelyBirds.map(b => ({ name: b })),\n      dot: this.diffMarker(t.diff, 11, false),\n      scoreBox: { fontSize: '15px', fontWeight: '800', color: this.scoreColor(t.score), background: t.score >= 85 ? 'rgba(194,112,61,0.14)' : 'rgba(138,154,91,0.18)', borderRadius: '8px', padding: '4px 9px' },\n      open: () => this.scrollToScreen('Trail detail'),\n    }));\n    const tsLabel = { sighting: 'Sighting probability', difficulty: 'Difficulty', time: 'Time to ride', effort: 'Effort', features: 'Features' }[ts];\n    const tsArrow = dir === 'asc' ? '↑' : '↓';\n    const trailCountLabel = filterName ? (tdisplay.length + ' trail' + (tdisplay.length === 1 ? '' : 's')) : '14 trails';\n\n    // ---- Targeting (species selection) ----\n    const targetSpecies = this.state.targetSpecies || 'Barred Owl';\n    const speciesCards = catalog.map(s => ({\n      slotId: s.slotId, name: s.name, like: s.like,\n      sub: s.sci + ' · ' + s.trails.length + ' trails',\n      cardStyle: { display: 'flex', alignItems: 'center', gap: '13px', borderRadius: '16px', padding: '12px 14px', cursor: 'pointer', background: s.name === targetSpecies ? '#2d3b2d' : '#fff', boxShadow: s.name === targetSpecies ? 'none' : '0 1px 4px rgba(33,48,42,0.05)' },\n      nameStyle: { fontSize: '15px', fontWeight: '700', color: s.name === targetSpecies ? '#fff' : '#21302a' },\n      subStyle: { fontSize: '12px', fontFamily: \"'Space Mono',monospace\", color: s.name === targetSpecies ? '#9bb08f' : '#7a7d70' },\n      likeStyle: { fontSize: '18px', fontWeight: '800', color: s.likeColor },\n      pick: () => this.setState({ targetSpecies: s.name }),\n    }));\n    const targetEntry = catalog.find(s => s.name === targetSpecies) || catalog[0];\n    const applyLabel = 'Show ' + targetEntry.trails.length + ' trails for ' + targetSpecies;\n\n    // ---- Trips history screen ----\n    const tripList = this.trips().map(tr => ({\n      date: tr.date, trail: tr.trail, meta: tr.miles + ' mi · ' + tr.diff,\n      dot: this.diffMarker(tr.diff, 10, false),\n      birds: tr.birds.map(b => ({ name: b })),\n      birdCount: tr.birds.length + ' birds',\n      lifers: tr.lifers > 0 ? ('+' + tr.lifers + ' lifer' + (tr.lifers > 1 ? 's' : '')) : '',\n      hasLifers: tr.lifers > 0,\n    }));\n    const totalBirds = this.trips().reduce((n, t) => n + t.birds.length, 0);\n\n    return {\n      trailSortChips, trailList, trailSortLabel: tsLabel, trailSortArrow: tsArrow,\n      trailCountLabel,\n      speciesCards, applyLabel,\n      applyFilter: () => { this.setState({ trailFilter: this.state.targetSpecies || 'Barred Owl' }); this.scrollToScreen('Trails'); },\n      trailFilterActive: !!filterName, trailFilterName: filterName || '',\n      clearTrailFilter: () => this.setState({ trailFilter: null }),\n      tripList, tripsTotal: String(this.trips().length), tripBirdsTotal: String(totalBirds),\n      goDiscover: () => this.scrollToScreen('Discover'),\n      goYou: () => this.scrollToScreen('You'),\n      heroName: sel.name, heroWindow: sel.window, heroScore: String(sel.score), heroRing,\n      heroDiffMarker: this.diffMarker(sel.diff, 13, true), heroDiff: sel.diff.toUpperCase(),\n      heroRealfeel: sel.realfeel, heroSky: sel.sky, heroCondition: sel.condition, heroPeak: sel.peak,\n      ranked, sortLabel,\n      cycleSort: () => this.setState(s => ({ sortBy: s.sortBy === 'wildlife' ? 'distance' : s.sortBy === 'distance' ? 'effort' : 'wildlife' })),\n      goTrail: () => this.scrollToScreen('Trail detail'),\n      goNav: () => this.scrollToScreen('Fun-drive nav'),\n      goBirbs: () => this.scrollToScreen('Targeting'),\n      goTrails: () => this.scrollToScreen('Trails'),\n      goTrips: () => this.scrollToScreen('Trips'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
